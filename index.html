<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DM Pipeline</title>
    <meta name="description" content="DM Pipeline Performance Dashboard" />

    <meta property="og:title" content="DM Pipeline" />
    <meta property="og:description" content="DM Pipeline Performance Dashboard" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://quddify-server-production.up.railway.app wss://quddify-server-production.up.railway.app; img-src 'self' data: https:; frame-ancestors 'none';" />
    <script>
      (function(){
        try {
          var k = 'dm-pipeline-theme';
          var t = localStorage.getItem(k);
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
